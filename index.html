<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>張育瑋 | Developer</title>
<meta name="description" content="張育瑋 — 全端工程師，提供軟體開發服務與個人作品集。">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0F172A;--blue:#2563EB;--blue-light:#3B82F6;--slate:#475569;--slate-light:#94A3B8;--border:#E2E8F0;--bg:#FFFFFF;--bg-2:#F8FAFC}
body{font-family:'Poppins','Noto Sans TC',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.page{text-align:center;padding:40px 24px;max-width:560px;width:100%}

.avatar{width:80px;height:80px;border-radius:50%;overflow:hidden;margin:0 auto 20px;border:3px solid var(--border)}
.avatar img{width:100%;height:100%;object-fit:cover}

h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
h1 span{color:var(--blue)}
.subtitle{font-size:15px;color:var(--slate);margin-bottom:40px}

.cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.card{background:var(--bg);border:1.5px solid var(--border);border-radius:16px;padding:36px 32px;width:240px;text-align:center;transition:all .25s;cursor:pointer;text-decoration:none;color:inherit}
.card:hover{border-color:var(--blue);box-shadow:0 12px 40px rgba(37,99,235,.1);transform:translateY(-4px)}
.card-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.card-icon svg{width:24px;height:24px}
.card-icon.blue{background:#EFF6FF;color:var(--blue)}
.card-icon.warm{background:#FEF3C7;color:#D97706}
.card h2{font-size:17px;font-weight:700;margin-bottom:6px}
.card p{font-size:13px;color:var(--slate-light);line-height:1.6}
.card .arrow{display:inline-flex;align-items:center;gap:4px;margin-top:14px;font-size:13px;font-weight:600;color:var(--blue)}
.card .arrow svg{width:14px;height:14px;transition:transform .2s}
.card:hover .arrow svg{transform:translateX(3px)}

.contact{margin-top:40px;font-size:13px;color:var(--slate-light)}
.contact a{color:var(--blue);text-decoration:none;font-weight:600}
.contact a:hover{text-decoration:underline}

footer{margin-top:32px;font-size:11px;color:var(--slate-light)}
</style>
</head>
<body>
<div class="page">
  <div class="avatar">
    <img src="images/profile.jpg" alt="張育瑋">
  </div>
  <h1>張育瑋<span>.</span></h1>
  <p class="subtitle">Full-Stack Developer</p>

  <div class="cards">
    <a href="freelance.html" class="card">
      <div class="card-icon blue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <h2>開發服務</h2>
      <p>Web App / LINE Bot / AI 自動化<br>接案合作與作品展示</p>
      <div class="arrow">
        查看詳情
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>
    <a href="resume.html" class="card">
      <div class="card-icon warm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      </div>
      <h2>個人履歷</h2>
      <p>工作經歷 / 技能 / 學歷<br>完整個人背景介紹</p>
      <div class="arrow">
        查看詳情
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>
    </a>
  </div>

  <div class="contact">
    <a href="mailto:ywzhang0913@gmail.com">ywzhang0913@gmail.com</a>
  </div>

  <footer>&copy; 2026 張育瑋</footer>
</div>
</body>
</html>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0F172A;--blue:#2563EB;--slate:#475569;--slate-light:#94A3B8;--border:#E2E8F0;--bg:#FFFFFF}
body{font-family:'Poppins','Noto Sans TC',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.page{text-align:center;padding:40px 24px;max-width:480px;width:100%}
.avatar{width:88px;height:88px;border-radius:50%;overflow:hidden;margin:0 auto 24px;border:3px solid var(--border)}
.avatar img{width:100%;height:100%;object-fit:cover}
h1{font-size:32px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
h1 span{color:var(--blue)}
.role{font-size:15px;color:var(--slate);margin-bottom:8px;font-weight:500}
.bio{font-size:14px;color:var(--slate-light);line-height:1.7;margin-bottom:32px;max-width:360px;margin-left:auto;margin-right:auto}
.contact{margin-bottom:24px}
.contact a{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s}
.contact a:hover{background:#1E293B;box-shadow:0 4px 12px rgba(15,23,42,.15);transform:translateY(-1px)}
.contact a svg{width:16px;height:16px}
.email{font-size:13px;color:var(--slate-light);margin-bottom:32px}
.email a{color:var(--blue);text-decoration:none;font-weight:500}
.email a:hover{text-decoration:underline}
.links{display:flex;gap:16px;justify-content:center}
.links a{width:40px;height:40px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--slate)}
.links a:hover{border-color:var(--blue);color:var(--blue);background:#EFF6FF}
.links a svg{width:18px;height:18px}
footer{margin-top:32px;font-size:11px;color:var(--slate-light)}
</style>
</head>

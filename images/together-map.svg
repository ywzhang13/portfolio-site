<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Map background -->
  <rect width="400" height="500" fill="#e8f4e8"/>
  <!-- Roads -->
  <rect x="0" y="180" width="400" height="24" fill="#fff" rx="2"/>
  <rect x="160" y="0" width="24" height="500" fill="#fff" rx="2"/>
  <rect x="280" y="100" width="24" height="400" fill="#fff" rx="2"/>
  <rect x="60" y="300" width="340" height="20" fill="#fff" rx="2"/>
  <!-- Park area -->
  <rect x="30" y="50" width="110" height="100" rx="12" fill="#c8e6c9"/>
  <!-- Water -->
  <ellipse cx="340" cy="80" rx="50" ry="40" fill="#b3e5fc"/>
  <!-- Buildings -->
  <rect x="200" y="40" width="50" height="50" rx="6" fill="#d7ccc8"/>
  <rect x="60" y="210" width="70" height="60" rx="6" fill="#d7ccc8"/>
  <rect x="200" y="210" width="60" height="60" rx="6" fill="#d7ccc8"/>
  <rect x="310" y="330" width="60" height="50" rx="6" fill="#d7ccc8"/>
  <rect x="30" y="340" width="80" height="60" rx="6" fill="#d7ccc8"/>
  <!-- Capsule markers -->
  <!-- Active marker -->
  <g transform="translate(100, 130)">
    <rect x="-60" y="-18" width="120" height="36" rx="18" fill="#fff" stroke="#00D0DD" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" font-weight="bold" font-family="Inter, sans-serif" fill="#2D3436">&#127939; 跑步 3/5</text>
  </g>
  <!-- Boosted marker -->
  <g transform="translate(250, 260)">
    <rect x="-65" y="-18" width="130" height="36" rx="18" fill="#fff" stroke="#FFD700" stroke-width="3"/>
    <text x="-4" y="5" text-anchor="middle" font-size="12" font-weight="bold" font-family="Inter, sans-serif" fill="#2D3436">&#11088; 桌遊 5/6</text>
  </g>
  <!-- Normal marker -->
  <g transform="translate(80, 380)">
    <rect x="-55" y="-18" width="110" height="36" rx="18" fill="#fff" stroke="#00D0DD" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" font-weight="bold" font-family="Inter, sans-serif" fill="#2D3436">&#127828; 美食 1/4</text>
  </g>
  <!-- Full marker -->
  <g transform="translate(320, 160)">
    <rect x="-50" y="-18" width="100" height="36" rx="18" fill="#f5f5f5" stroke="#bbb" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" font-weight="bold" font-family="Inter, sans-serif" fill="#999">&#127934; 已滿</text>
  </g>
  <!-- Small dot markers -->
  <circle cx="180" cy="420" r="6" fill="#00D0DD"/>
  <circle cx="350" cy="430" r="6" fill="#00D0DD"/>
  <circle cx="230" cy="370" r="6" fill="#FFD700"/>
  <!-- Top search bar -->
  <rect x="20" y="16" width="360" height="44" rx="22" fill="#fff" fill-opacity="0.95"/>
  <text x="50" y="43" font-size="14" fill="#aaa" font-family="Inter, sans-serif">&#128269; 搜尋附近活動...</text>
  <circle cx="355" cy="38" r="14" fill="#00D0DD"/>
  <text x="355" y="43" text-anchor="middle" font-size="14" fill="#fff" font-family="Inter, sans-serif">&#128100;</text>
  <!-- Bottom FAB -->
  <circle cx="360" cy="460" r="24" fill="#00D0DD"/>
  <text x="360" y="466" text-anchor="middle" font-size="20" fill="#fff">+</text>
  <!-- Location button -->
  <circle cx="360" cy="400" r="20" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="360" y="406" text-anchor="middle" font-size="16">&#128205;</text>
</svg>
